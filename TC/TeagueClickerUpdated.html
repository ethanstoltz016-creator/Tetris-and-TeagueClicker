        }

        // Handle clicking
        function handleClick(e) {
            const amount = gameState.clickPower;
            gameState.teagues += amount;
            gameState.totalTeagues += amount;
            gameState.totalClicks++;

            // Create floating text
            createFloatingText(e.clientX, e.clientY, `+${amount}`);

            // Create ripple
            createRipple(e.clientX, e.clientY);

            // Create particles occasionally
            if (Math.random() < 0.3) {
                createParticles(e.clientX, e.clientY);
            }

            // Check achievements
            checkAchievements();

            // Update display
            updateDisplay();
            renderUpgrades();

            // Save periodically
            if (gameState.totalClicks % 10 === 0) {
                saveGame();
            }
        }

        // Create floating text
        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = text;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 40}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // Create ripple effect
        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = `${x - 50}px`;
            ripple.style.top = `${y - 50}px`;
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // Create star particles
        function createParticles(x, y) {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle star';
                    particle.textContent = '✡';
                    particle.style.left = `${x + (Math.random() - 0.5) * 100}px`;
                    particle.style.top = `${y + (Math.random() - 0.5) * 100}px`;
                    particle.style.animation = `floatUp ${0.8 + Math.random() * 0.5}s ease-out forwards`;
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1500);
                }, i * 100);
            }
        }

        // Create confetti
        function createConfetti() {
            const colors = ['#0038b8', '#ffffff', '#d4af37'];
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = `${Math.random() * 100}vw`;
                    confetti.style.animationDuration = `${2 + Math.random() * 2}s`;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }

        // Buy upgrade
        function buyUpgrade(upgradeId) {
            const upgrade = upgrades.find(u => u.id === upgradeId);
            if (!upgrade) return;

            const currentCount = gameState.upgrades[upgradeId]?.count || 0;
            
            // Check max count
            if (upgrade.maxCount && currentCount >= upgrade.maxCount) return;

            // Calculate cost (increases by 15% each purchase)
            const cost = Math.floor(upgrade.baseCost * Math.pow(1.15, currentCount));

            if (gameState.teagues >= cost) {
                gameState.teagues -= cost;
                
                if (!gameState.upgrades[upgradeId]) {
                    gameState.upgrades[upgradeId] = { count: 0 };
                }
                gameState.upgrades[upgradeId].count++;

                // Update click power
                gameState.clickPower += upgrade.power;

                // Check for final upgrade
                if (upgrade.isFinal && !gameState.victoryShown) {
                    gameState.victoryShown = true;
                    showVictory();
                }

                // Update display
                updateDisplay();
                renderUpgrades();
                checkAchievements();
                saveGame();
            }
        }

        // Render upgrades
        function renderUpgrades() {
            const container = document.getElementById('upgradesList');
            container.innerHTML = '';

            upgrades.forEach(upgrade => {
                const count = gameState.upgrades[upgrade.id]?.count || 0;
                const currentCost = Math.floor(upgrade.baseCost * Math.pow(1.15, count));
                const canAfford = gameState.teagues >= currentCost;
                const isMaxed = upgrade.maxCount && count >= upgrade.maxCount;

                const div = document.createElement('div');
                div.className = 'upgrade';
                if (!canAfford && !isMaxed) div.classList.add('locked');
                if (count > 0) div.classList.add('purchased');
                if (upgrade.isFinal) div.classList.add('final-upgrade');

                div.innerHTML = `
                    <div class="upgrade-count">${count > 0 ? `x${count}` : ''}</div>
                    <div class="upgrade-header">
                        <span class="upgrade-name">${upgrade.icon} ${upgrade.name}</span>
                        <span class="upgrade-cost">${isMaxed ? 'MAX' : formatNumber(currentCost)} ₪</span>
                    </div>
                    <div class="upgrade-desc">${upgrade.description}</div>
                    <div class="upgrade-power">+${formatNumber(upgrade.power)} per click</div>
                `;

                if (!isMaxed) {
                    div.onclick = () => buyUpgrade(upgrade.id);
                }

                container.appendChild(div);
            });

            // Update progress bar
            const progress = Math.min(100, (gameState.teagues / 676767) * 100);
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = `${progress}%`;
            progressFill.textContent = `${Math.floor(progress)}%`;
        }

        // Check achievements
        function checkAchievements() {
            let newAchievement = false;
            achievements.forEach(achievement => {
                if (!gameState.achievements.includes(achievement.id) && achievement.condition()) {
                    gameState.achievements.push(achievement.id);
                    newAchievement = true;
                }
            });
            if (newAchievement) {
                renderAchievements();
            }
        }

        // Render achievements
        function renderAchievements() {
            const container = document.getElementById('achievementList');
            container.innerHTML = '';

            achievements.forEach(achievement => {
                const div = document.createElement('div');
                div.className = 'achievement';
                if (gameState.achievements.includes(achievement.id)) {
                    div.classList.add('unlocked');
                }
                div.textContent = achievement.name;
                div.title = achievement.description;
                container.appendChild(div);
            });
        }

        // Update display
        function updateDisplay() {
            document.getElementById('teagueCount').textContent = formatNumber(gameState.teagues);
            document.getElementById('perClick').textContent = formatNumber(gameState.clickPower);
        }

        // Format large numbers
        function formatNumber(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }

        // Show victory message
        function showVictory() {
            createConfetti();
            document.getElementById('victoryMessage').classList.add('show');
        }

        // Close victory message
        function closeVictory() {
            document.getElementById('victoryMessage').classList.remove('show');
        }

        // Save game
        function saveGame() {
            localStorage.setItem('teagueClickerSave', JSON.stringify(gameState));
        }

        // Load game
        function loadGame() {
            const saved = localStorage.getItem('teagueClickerSave');
            if (saved) {
                const loaded = JSON.parse(saved);
                gameState = { ...gameState, ...loaded };
            }
        }

        // Reset game
        function resetGame() {
            if (confirm('Are you sure you want to reset all progress? This cannot be undone!')) {
                gameState = {
                    teagues: 0,
                    clickPower: 1,
                    totalClicks: 0,
                    totalTeagues: 0,
                    upgrades: {},
                    achievements: [],
                    victoryShown: false
                };
                localStorage.removeItem('teagueClickerSave');
                updateDisplay();
                renderUpgrades();
                renderAchievements();
            }
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', init);

        // Auto-save every 30 seconds
        setInterval(saveGame, 30000);
    </script>
</body>
</html>
